<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invite</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(135deg, #fff5f0, #ffe4e1);
  text-align: center;
}

/* Screens */
.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.active {
  display: flex;
}

/* Button */
button {
  padding: 14px 28px;
  font-size: 18px;
  background: #b22222;
  color: white;
  border: none;
  border-radius: 30px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* Invite Card */
.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  width: 300px;
}

/* Canvas */
canvas {
  margin-top: 15px;
  border-radius: 15px;
}

/* Hidden text */
#hiddenText {
  display: none;
  margin-top: 15px;
  font-size: 18px;
  color: #8b0000;
  line-height: 1.6;
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="screen1" class="screen active">
  <h1>💌 You're Invited</h1>
  <button onclick="openInvite()">Tap to Open</button>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen">
  <div class="card">
    <h3>Scratch to Reveal ✨</h3>
    <canvas id="canvas" width="260" height="120"></canvas>

    <div id="hiddenText">
      <strong>Kavya ❤️ Partner</strong><br>
      25th December 2026<br>
      Save the Date 💫
    </div>
  </div>
</div>

<script>
function openInvite() {
  document.getElementById("screen1").classList.remove("active");
  document.getElementById("screen2").classList.add("active");
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Create smooth gradient overlay
let gradient = ctx.createLinearGradient(0,0,260,120);
gradient.addColorStop(0,"#c0c0c0");
gradient.addColorStop(1,"#999999");

ctx.fillStyle = gradient;
ctx.fillRect(0,0,canvas.width,canvas.height);

// Brush settings
ctx.globalCompositeOperation = "destination-out";

let isDrawing = false;

function start(e){
  isDrawing = true;
}

function stop(){
  isDrawing = false;
  checkReveal();
}

function draw(e){
  if(!isDrawing) return;

  let rect = canvas.getBoundingClientRect();
  let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  let y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

  ctx.beginPath();
  ctx.arc(x,y,20,0,Math.PI*2);
  ctx.fill();
}

// Events (mobile + desktop)
canvas.addEventListener("mousedown", start);
canvas.addEventListener("mouseup", stop);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchend", stop);
canvas.addEventListener("touchmove", draw);

// Reveal detection
function checkReveal(){
  let pixels = ctx.getImageData(0,0,canvas.width,canvas.height);
  let count = 0;

  for(let i=3;i<pixels.data.length;i+=4){
    if(pixels.data[i] === 0) count++;
  }

  let percent = count / (canvas.width * canvas.height);

  if(percent > 0.35){
    document.getElementById("hiddenText").style.display = "block";
  }
}
</script>

</body>
</html>
