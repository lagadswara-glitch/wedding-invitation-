<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invite</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: linear-gradient(135deg, #fff1eb, #ace0f9);
  text-align: center;
  overflow: hidden;
}

/* Screens */
.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.active {
  display: flex;
}

/* Envelope */
.envelope {
  width: 200px;
  height: 120px;
  background: #b22222;
  position: relative;
  border-radius: 10px;
}
.flap {
  position: absolute;
  width: 0;
  height: 0;
  border-left: 100px solid transparent;
  border-right: 100px solid transparent;
  border-bottom: 60px solid #8b0000;
  top: -60px;
  transition: 0.6s;
}
.open .flap {
  transform: rotateX(180deg);
}

/* Card */
.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  width: 300px;
}

/* Buttons */
button {
  padding: 12px 24px;
  margin-top: 10px;
  border: none;
  border-radius: 25px;
  background: #b22222;
  color: white;
  font-size: 16px;
}

/* Canvas */
canvas {
  margin-top: 15px;
  border-radius: 10px;
}

/* Hidden Text */
#hiddenText {
  display: none;
  margin-top: 15px;
  color: #8b0000;
  line-height: 1.6;
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="screen1" class="screen active">
  <div class="envelope" onclick="openEnvelope(this)">
    <div class="flap"></div>
  </div>
  <p>Tap Envelope 💌</p>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen">
  <div class="card">
    <h3>Scratch to Reveal ✨</h3>
    <canvas id="canvas" width="260" height="120"></canvas>

    <div id="hiddenText">
      <strong>Kavya ❤️ Partner</strong><br>
      25th December 2026<br>
      Save the Date 💫
      
      <br><br>

      <button onclick="openMap()">📍 Location</button>
      <button onclick="rsvp()">📝 RSVP</button>
    </div>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script>
function openEnvelope(el){
  el.classList.add("open");
  document.getElementById("music").play();

  setTimeout(()=>{
    document.getElementById("screen1").classList.remove("active");
    document.getElementById("screen2").classList.add("active");
  },800);
}

// Scratch logic
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

ctx.fillStyle = "#999";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.globalCompositeOperation = "destination-out";

let drawing = false;

function getXY(e){
  let rect = canvas.getBoundingClientRect();
  return {
    x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
    y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top
  };
}

function start(){ drawing = true; }
function stop(){ drawing = false; check(); }

function draw(e){
  if(!drawing) return;
  let pos = getXY(e);

  ctx.beginPath();
  ctx.arc(pos.x,pos.y,20,0,Math.PI*2);
  ctx.fill();
}

canvas.addEventListener("mousedown", start);
canvas.addEventListener("mouseup", stop);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchend", stop);
canvas.addEventListener("touchmove", draw);

function check(){
  let pixels = ctx.getImageData(0,0,canvas.width,canvas.height);
  let count = 0;

  for(let i=3;i<pixels.data.length;i+=4){
    if(pixels.data[i] === 0) count++;
  }

  if(count > pixels.data.length * 0.25){
    document.getElementById("hiddenText").style.display = "block";
  }
}

// Buttons
function openMap(){
  window.open("https://maps.google.com", "_blank");
}

function rsvp(){
  window.open("https://forms.gle", "_blank");
}
</script>

</body>
</html>
